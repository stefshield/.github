name: Feature Request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: [ "enhancement" ]
assignees:
  - hstefanov1
type: feature
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the feature or improvement. One or two sentences.
    validations:
      required: true

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem statement
      description: What problem does this solve? What are you trying to do that you can't do today?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Describe the solution you would like to see.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: A checklist of conditions that must be met for this feature to be considered complete.
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Mockups, examples, links, or anything else that might help.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the project [Code of Conduct](https://github.com/stefshield/.github/blob/main/CODE_OF_CONDUCT.md)
          required: true
